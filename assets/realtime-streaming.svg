<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <rect width="900" height="280" fill="#0B1426" rx="8"/>
  <text x="450" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#4DA8DA">Real-Time WebSocket Streaming</text>

  <!-- Backend -->
  <g transform="translate(30,50)">
    <rect width="250" height="200" rx="8" fill="#111B2E" stroke="#1E3A5F" stroke-width="1"/>
    <text x="125" y="25" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#06D6A0">Backend (port 8000)</text>
    <rect x="15" y="40" width="220" height="30" rx="4" fill="rgba(6,214,160,0.1)" stroke="#06D6A0" stroke-width="0.5"/>
    <text x="125" y="60" text-anchor="middle" font-family="monospace" font-size="10" fill="#06D6A0">simulation_loop() @ 5Hz</text>
    <rect x="15" y="80" width="220" height="25" rx="4" fill="rgba(77,168,218,0.1)" stroke="#4DA8DA" stroke-width="0.5"/>
    <text x="125" y="97" text-anchor="middle" font-family="monospace" font-size="9" fill="#4DA8DA">world.step() → state_update</text>
    <rect x="15" y="115" width="220" height="25" rx="4" fill="rgba(244,162,97,0.1)" stroke="#F4A261" stroke-width="0.5"/>
    <text x="125" y="132" text-anchor="middle" font-family="monospace" font-size="9" fill="#F4A261">agent.run_cycle() → agent_log</text>
    <rect x="15" y="150" width="220" height="25" rx="4" fill="rgba(0,212,255,0.1)" stroke="#00D4FF" stroke-width="0.5"/>
    <text x="125" y="167" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF">ConnectionManager.broadcast()</text>
  </g>

  <!-- WebSocket Arrow -->
  <g transform="translate(290,140)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#00D4FF" stroke-width="2" stroke-dasharray="6,3"/>
    <polygon points="100,-5 110,0 100,5" fill="#00D4FF"/>
    <text x="55" y="-10" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D4FF">ws://</text>
    <text x="55" y="18" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">JSON @ 5Hz</text>
  </g>

  <!-- Frontend -->
  <g transform="translate(410,50)">
    <rect width="250" height="200" rx="8" fill="#111B2E" stroke="#1E3A5F" stroke-width="1"/>
    <text x="125" y="25" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#F4A261">Frontend (React)</text>
    <rect x="15" y="40" width="220" height="25" rx="4" fill="rgba(244,162,97,0.1)" stroke="#F4A261" stroke-width="0.5"/>
    <text x="125" y="57" text-anchor="middle" font-family="monospace" font-size="9" fill="#F4A261">useWebSocket() singleton</text>
    <rect x="15" y="75" width="220" height="25" rx="4" fill="rgba(77,168,218,0.1)" stroke="#4DA8DA" stroke-width="0.5"/>
    <text x="125" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#4DA8DA">zustand store.updateState()</text>
    <rect x="15" y="110" width="220" height="25" rx="4" fill="rgba(6,214,160,0.1)" stroke="#06D6A0" stroke-width="0.5"/>
    <text x="125" y="127" text-anchor="middle" font-family="monospace" font-size="9" fill="#06D6A0">useFrame → ref.position.lerp()</text>
    <text x="125" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Zero React re-renders</text>
    <text x="125" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">60fps smooth animation</text>
  </g>

  <!-- Message types -->
  <g transform="translate(690,50)">
    <rect width="190" height="200" rx="8" fill="#111B2E" stroke="#1E3A5F" stroke-width="1"/>
    <text x="95" y="25" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#00D4FF">Message Types</text>
    <rect x="10" y="40" width="170" height="22" rx="3" fill="rgba(77,168,218,0.15)"/>
    <text x="95" y="55" text-anchor="middle" font-family="monospace" font-size="9" fill="#4DA8DA">state_update (5Hz)</text>
    <rect x="10" y="70" width="170" height="22" rx="3" fill="rgba(244,162,97,0.15)"/>
    <text x="95" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#F4A261">agent_log (per event)</text>
    <rect x="10" y="100" width="170" height="22" rx="3" fill="rgba(6,214,160,0.15)"/>
    <text x="95" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#06D6A0">agent_status (cycle)</text>
    <text x="95" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Auto-reconnect:</text>
    <text x="95" y="163" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.35)">1s → 2s → 4s → 30s max</text>
    <text x="95" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">10 attempts</text>
  </g>
</svg>
