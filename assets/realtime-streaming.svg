<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380">
  <!-- Background -->
  <rect width="1000" height="380" fill="#0B1426" rx="8"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="bold" fill="#00D4FF">Real-Time WebSocket Streaming</text>

  <!-- ===== LEFT COLUMN: Backend ===== -->
  <text x="175" y="58" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Backend (FastAPI :8000)</text>

  <!-- Simulation Engine box -->
  <rect x="50" y="70" width="250" height="52" rx="8" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="175" y="90" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">Simulation Engine</text>
  <text x="175" y="110" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF">step() @ 5Hz</text>

  <!-- Arrow down -->
  <line x1="175" y1="122" x2="175" y2="140" stroke="#00D4FF" stroke-width="1.5"/>
  <polygon points="175,143 170,137 180,137" fill="#00D4FF"/>

  <!-- ConnectionManager box -->
  <rect x="50" y="145" width="250" height="52" rx="8" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="175" y="165" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">ConnectionManager</text>
  <text x="175" y="185" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF">broadcast()</text>

  <!-- ===== CENTER: WebSocket Arrows ===== -->
  <text x="500" y="58" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600" fill="#ffffff">WebSocket (ws://)</text>

  <!-- Server → Client arrow (top) -->
  <line x1="310" y1="100" x2="680" y2="100" stroke="#00D4FF" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="680,100 670,94 670,106" fill="#00D4FF"/>
  <rect x="400" y="84" width="200" height="22" rx="4" fill="#0B1426"/>
  <text x="500" y="100" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF" font-weight="600">state_update messages</text>

  <!-- Client → Server arrow (bottom) -->
  <line x1="680" y1="145" x2="310" y2="145" stroke="#F4A261" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="310,145 320,139 320,151" fill="#F4A261"/>
  <rect x="390" y="130" width="220" height="22" rx="4" fill="#0B1426"/>
  <text x="500" y="146" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#F4A261" font-weight="600">start / pause / stop commands</text>

  <!-- Bidirectional icon -->
  <text x="500" y="124" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899aa">bidirectional</text>

  <!-- ===== RIGHT COLUMN: Frontend ===== -->
  <text x="825" y="58" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Frontend (React :3000)</text>

  <!-- useWebSocket hook box -->
  <rect x="700" y="70" width="250" height="52" rx="8" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="825" y="90" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">useWebSocket hook</text>
  <text x="825" y="110" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF">auto-reconnect</text>

  <!-- Arrow down -->
  <line x1="825" y1="122" x2="825" y2="140" stroke="#00D4FF" stroke-width="1.5"/>
  <polygon points="825,143 820,137 830,137" fill="#00D4FF"/>

  <!-- zustand store box -->
  <rect x="700" y="145" width="250" height="52" rx="8" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="825" y="165" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">zustand store</text>
  <text x="825" y="185" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF">getState().updateState()</text>

  <!-- Arrow down -->
  <line x1="825" y1="197" x2="825" y2="215" stroke="#00D4FF" stroke-width="1.5"/>
  <polygon points="825,218 820,212 830,212" fill="#00D4FF"/>

  <!-- R3F useFrame box -->
  <rect x="700" y="220" width="250" height="52" rx="8" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="825" y="240" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">R3F useFrame</text>
  <text x="825" y="260" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF">ref.position.lerp()</text>

  <!-- ===== MESSAGE FORMAT ===== -->
  <text x="30" y="235" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#ffffff">Message Format:</text>

  <rect x="30" y="243" width="620" height="40" rx="6" fill="#111d33" stroke="#1E3A5F" stroke-width="1"/>
  <text x="40" y="260" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#06D6A0">{"type": "state_update", "payload": {"fleet": [...], "coverage_pct": 67.2, "tick": 142}}</text>
  <text x="40" y="275" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#8899aa">JSON via ws://localhost:8000/ws/simulation</text>

  <!-- ===== RECONNECT BACKOFF ===== -->
  <text x="30" y="310" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#ffffff">Reconnect Backoff:</text>

  <rect x="30" y="318" width="620" height="34" rx="6" fill="#111d33" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Backoff steps -->
  <rect x="45" y="325" width="36" height="20" rx="4" fill="#1E3A5F"/>
  <text x="63" y="339" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#ffffff">1s</text>

  <text x="89" y="339" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF">&#x2192;</text>

  <rect x="101" y="325" width="36" height="20" rx="4" fill="#1E3A5F"/>
  <text x="119" y="339" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#ffffff">2s</text>

  <text x="145" y="339" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF">&#x2192;</text>

  <rect x="157" y="325" width="36" height="20" rx="4" fill="#1E3A5F"/>
  <text x="175" y="339" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#ffffff">4s</text>

  <text x="201" y="339" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF">&#x2192;</text>

  <rect x="213" y="325" width="36" height="20" rx="4" fill="#1E3A5F"/>
  <text x="231" y="339" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#ffffff">8s</text>

  <text x="257" y="339" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF">&#x2192;</text>

  <rect x="269" y="325" width="40" height="20" rx="4" fill="#1E3A5F"/>
  <text x="289" y="339" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#ffffff">16s</text>

  <text x="317" y="339" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF">&#x2192;</text>

  <rect x="329" y="325" width="72" height="20" rx="4" fill="#E63946" opacity="0.8"/>
  <text x="365" y="339" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#ffffff" font-weight="600">30s (max)</text>

  <text x="415" y="339" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#8899aa">exponential backoff with cap</text>

  <!-- ===== BOTTOM: Flow summary ===== -->
  <line x1="30" y1="362" x2="970" y2="362" stroke="#1E3A5F" stroke-width="0.5"/>
  <text x="500" y="376" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899aa">5 Hz tick &#x2192; JSON serialize &#x2192; WebSocket broadcast &#x2192; zustand update &#x2192; R3F lerp render @ 60fps</text>
</svg>