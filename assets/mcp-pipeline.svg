<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <!-- Background -->
  <rect width="1000" height="400" rx="12" fill="#0B1426"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">MCP-Driven Command Pipeline</text>

  <!-- Defs for gradients -->
  <defs>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- ============ STAGE 1: Assessor ============ -->
  <rect x="30" y="65" width="185" height="60" rx="12" fill="url(#cyanGrad)" stroke="#00D4FF" stroke-width="1.5"/>
  <!-- Gemini sparkle -->
  <polygon points="45,78 47,84 53,84 48,88 50,94 45,90 40,94 42,88 37,84 43,84" fill="#00D4FF" opacity="0.7"/>
  <text x="122" y="95" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#00D4FF">Assessor</text>
  <text x="122" y="115" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#FFFFFF" opacity="0.5">Agent 1</text>

  <!-- Tools below Assessor -->
  <text x="122" y="145" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">query_fleet</text>
  <text x="122" y="159" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">get_progress</text>
  <text x="122" y="173" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">assess_endurance</text>

  <!-- Vertical connector: box to tools -->
  <line x1="122" y1="125" x2="122" y2="135" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>

  <!-- ============ Arrow 1: Assessor -> Strategist ============ -->
  <line x1="215" y1="95" x2="268" y2="95" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <polygon points="268,91 276,95 268,99" fill="#00D4FF" opacity="0.7"/>
  <text x="246" y="86" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="8" fill="#F4A261" font-style="italic">assessment</text>

  <!-- ============ STAGE 2: Strategist ============ -->
  <rect x="278" y="65" width="185" height="60" rx="12" fill="url(#cyanGrad)" stroke="#00D4FF" stroke-width="1.5"/>
  <polygon points="293,78 295,84 301,84 296,88 298,94 293,90 288,94 290,88 285,84 291,84" fill="#00D4FF" opacity="0.7"/>
  <text x="370" y="95" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#00D4FF">Strategist</text>
  <text x="370" y="115" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#FFFFFF" opacity="0.5">Agent 2</text>

  <!-- Tools below Strategist -->
  <text x="370" y="145" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">partition</text>
  <text x="370" y="159" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">detect_frontier</text>
  <text x="370" y="173" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">plan_route</text>

  <line x1="370" y1="125" x2="370" y2="135" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>

  <!-- ============ Arrow 2: Strategist -> Dispatcher ============ -->
  <line x1="463" y1="95" x2="516" y2="95" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <polygon points="516,91 524,95 516,99" fill="#00D4FF" opacity="0.7"/>
  <text x="494" y="86" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="8" fill="#F4A261" font-style="italic">strategy</text>

  <!-- ============ STAGE 3: Dispatcher ============ -->
  <rect x="526" y="65" width="185" height="60" rx="12" fill="url(#cyanGrad)" stroke="#00D4FF" stroke-width="1.5"/>
  <polygon points="541,78 543,84 549,84 544,88 546,94 541,90 536,94 538,88 533,84 539,84" fill="#00D4FF" opacity="0.7"/>
  <text x="618" y="95" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#00D4FF">Dispatcher</text>
  <text x="618" y="115" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#FFFFFF" opacity="0.5">Agent 3</text>

  <!-- Tools below Dispatcher -->
  <text x="618" y="145" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">navigate_to</text>
  <text x="618" y="159" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">sweep_scan</text>
  <text x="618" y="173" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">recall_uav</text>
  <text x="618" y="187" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">mark_objective</text>

  <line x1="618" y1="125" x2="618" y2="135" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>

  <!-- ============ Arrow 3: Dispatcher -> Analyst ============ -->
  <line x1="711" y1="95" x2="764" y2="95" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
  <polygon points="764,91 772,95 764,99" fill="#00D4FF" opacity="0.7"/>
  <text x="738" y="86" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="8" fill="#F4A261" font-style="italic">execution_log</text>

  <!-- ============ STAGE 4: Analyst ============ -->
  <rect x="774" y="65" width="195" height="60" rx="12" fill="url(#cyanGrad)" stroke="#00D4FF" stroke-width="1.5"/>
  <polygon points="789,78 791,84 797,84 792,88 794,94 789,90 784,94 786,88 781,84 787,84" fill="#00D4FF" opacity="0.7"/>
  <text x="871" y="95" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#00D4FF">Analyst</text>
  <text x="871" y="115" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#FFFFFF" opacity="0.5">Agent 4</text>

  <!-- Tools below Analyst -->
  <text x="871" y="145" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">get_op_summary</text>

  <line x1="871" y1="125" x2="871" y2="135" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>

  <!-- Output label after Analyst -->
  <text x="871" y="210" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#F4A261" font-style="italic">report</text>
  <line x1="871" y1="155" x2="871" y2="205" stroke="#F4A261" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- ============ Bottom Bar: MCP Tool Server ============ -->
  <rect x="30" y="340" width="940" height="42" rx="10" fill="url(#barGrad)" stroke="#00D4FF" stroke-width="1" opacity="0.9"/>
  <text x="500" y="366" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">MCP Tool Server — 18 Tools via Streamable HTTP</text>

  <!-- Vertical dashed lines connecting each agent to the bottom bar -->
  <line x1="122" y1="190" x2="122" y2="340" stroke="#00D4FF" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="370" y1="190" x2="370" y2="340" stroke="#00D4FF" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="618" y1="200" x2="618" y2="340" stroke="#00D4FF" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  <line x1="871" y1="165" x2="871" y2="340" stroke="#00D4FF" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Small connection dots at the bar -->
  <circle cx="122" cy="340" r="3" fill="#00D4FF" opacity="0.6"/>
  <circle cx="370" cy="340" r="3" fill="#00D4FF" opacity="0.6"/>
  <circle cx="618" cy="340" r="3" fill="#00D4FF" opacity="0.6"/>
  <circle cx="871" cy="340" r="3" fill="#00D4FF" opacity="0.6"/>

  <!-- Decorative corner accents -->
  <line x1="10" y1="15" x2="10" y2="35" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="15" x2="30" y2="15" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="990" y1="15" x2="990" y2="35" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="990" y1="15" x2="970" y2="15" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="385" x2="10" y2="365" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="385" x2="30" y2="385" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="990" y1="385" x2="990" y2="365" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="990" y1="385" x2="970" y2="385" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>

  <!-- Subtle glow dots -->
  <circle cx="30" cy="340" r="1.5" fill="#00D4FF" opacity="0.3"/>
  <circle cx="970" cy="340" r="1.5" fill="#00D4FF" opacity="0.3"/>
</svg>