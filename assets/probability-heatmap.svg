<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="#0B1426" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#4DA8DA">Gaussian Probability Heatmap Lifecycle</text>

  <!-- 4 stages -->
  <!-- Stage 1: Initial -->
  <g transform="translate(30,55)">
    <rect width="190" height="230" rx="6" fill="#111B2E" stroke="#1E3A5F" stroke-width="1"/>
    <text x="95" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#F4A261">1. Initial Placement</text>
    <!-- Mini grid -->
    <g transform="translate(25,40)">
      <rect width="140" height="140" fill="#0B1426" rx="4"/>
      <!-- Low prob background -->
      <g opacity="0.3" fill="#4DA8DA">
        <rect x="0" y="0" width="140" height="140" rx="4"/>
      </g>
      <!-- High prob hotspot -->
      <circle cx="100" cy="40" r="30" fill="#F4A261" opacity="0.5"/>
      <circle cx="100" cy="40" r="15" fill="#E63946" opacity="0.6"/>
      <circle cx="45" cy="110" r="25" fill="#F4A261" opacity="0.4"/>
      <circle cx="45" cy="110" r="12" fill="#E63946" opacity="0.5"/>
      <!-- Objective markers -->
      <circle cx="100" cy="40" r="4" fill="#E63946"/>
      <circle cx="45" cy="110" r="4" fill="#E63946"/>
      <text x="100" y="36" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">OBJ</text>
      <text x="45" y="106" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">OBJ</text>
    </g>
    <text x="95" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">prob_matrix = 0.5 base</text>
    <text x="95" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">boosted near objectives</text>
  </g>

  <!-- Arrow -->
  <text x="232" y="170" font-family="system-ui,sans-serif" font-size="20" fill="#4DA8DA">&#x2192;</text>

  <!-- Stage 2: Diffusion -->
  <g transform="translate(250,55)">
    <rect width="190" height="230" rx="6" fill="#111B2E" stroke="#1E3A5F" stroke-width="1"/>
    <text x="95" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#06D6A0">2. Gaussian Diffusion</text>
    <g transform="translate(25,40)">
      <rect width="140" height="140" fill="#0B1426" rx="4"/>
      <g opacity="0.25" fill="#4DA8DA"><rect x="0" y="0" width="140" height="140" rx="4"/></g>
      <!-- Spread hotspots -->
      <circle cx="100" cy="40" r="45" fill="#F4A261" opacity="0.25"/>
      <circle cx="100" cy="40" r="25" fill="#F4A261" opacity="0.35"/>
      <circle cx="45" cy="110" r="40" fill="#F4A261" opacity="0.2"/>
      <circle cx="45" cy="110" r="20" fill="#F4A261" opacity="0.3"/>
    </g>
    <text x="95" y="205" text-anchor="middle" font-family="monospace" font-size="9" fill="#06D6A0">gaussian_filter(sigma=0.5)</text>
    <text x="95" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">each tick: uncertainty spreads</text>
  </g>

  <text x="452" y="170" font-family="system-ui,sans-serif" font-size="20" fill="#4DA8DA">&#x2192;</text>

  <!-- Stage 3: Scan -->
  <g transform="translate(470,55)">
    <rect width="190" height="230" rx="6" fill="#111B2E" stroke="#1E3A5F" stroke-width="1"/>
    <text x="95" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#00D4FF">3. Scan Update</text>
    <g transform="translate(25,40)">
      <rect width="140" height="140" fill="#0B1426" rx="4"/>
      <g opacity="0.2" fill="#4DA8DA"><rect x="0" y="0" width="140" height="140" rx="4"/></g>
      <!-- Scanned area (dark = cleared) -->
      <rect x="10" y="60" width="60" height="70" fill="#0B1426" opacity="0.8" rx="2"/>
      <text x="40" y="100" text-anchor="middle" font-family="monospace" font-size="8" fill="#06D6A0">prob=0</text>
      <!-- Found objective -->
      <circle cx="100" cy="40" r="20" fill="#E63946" opacity="0.4"/>
      <circle cx="100" cy="40" r="4" fill="#E63946"/>
      <text x="100" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#E63946">prob=1.0</text>
      <!-- Drone -->
      <polygon points="40,80 46,88 34,88" fill="#00D4FF"/>
      <circle cx="40" cy="84" r="12" fill="none" stroke="#00D4FF" stroke-width="0.5" stroke-dasharray="2,2"/>
    </g>
    <text x="95" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">clear: prob = 0</text>
    <text x="95" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">found: prob = 1.0</text>
  </g>

  <text x="672" y="170" font-family="system-ui,sans-serif" font-size="20" fill="#4DA8DA">&#x2192;</text>

  <!-- Stage 4: Self-healing -->
  <g transform="translate(690,55)">
    <rect width="190" height="230" rx="6" fill="#111B2E" stroke="#1E3A5F" stroke-width="1"/>
    <text x="95" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#F4A261">4. Self-Healing</text>
    <g transform="translate(25,40)">
      <rect width="140" height="140" fill="#0B1426" rx="4"/>
      <g opacity="0.2" fill="#4DA8DA"><rect x="0" y="0" width="140" height="140" rx="4"/></g>
      <!-- Old scanned area regaining prob -->
      <rect x="10" y="60" width="60" height="70" fill="#F4A261" opacity="0.15" rx="2"/>
      <text x="40" y="100" text-anchor="middle" font-family="monospace" font-size="7" fill="#F4A261">prob rising</text>
      <!-- Arrow indicating regrowth -->
      <text x="40" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#F4A261">&#x2191;</text>
    </g>
    <text x="95" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">unscanned areas regain</text>
    <text x="95" y="218" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">probability over time</text>
  </g>
</svg>
