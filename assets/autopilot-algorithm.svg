<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#0B1426"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Autonomous Search Algorithm</text>

  <!-- ============ ROW 1: UAV Idle at Base ============ -->
  <!-- Action: rounded rect, cyan -->
  <rect x="365" y="52" width="170" height="36" rx="10" fill="#00D4FF" fill-opacity="0.12" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="450" y="75" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="600" fill="#00D4FF">UAV Idle at Base</text>

  <!-- Arrow down -->
  <line x1="450" y1="88" x2="450" y2="108" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="446,106 450,114 454,106" fill="#CCCCCC"/>

  <!-- ============ ROW 2: Decision - Power > threshold? ============ -->
  <!-- Diamond (amber) -->
  <polygon points="450,116 540,148 450,180 360,148" fill="#F4A261" fill-opacity="0.12" stroke="#F4A261" stroke-width="1.5"/>
  <text x="450" y="145" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#F4A261">Power &gt;</text>
  <text x="450" y="158" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#F4A261">threshold?</text>

  <!-- No branch: left to "Charge at Base" -->
  <line x1="360" y1="148" x2="270" y2="148" stroke="#E63946" stroke-width="1.2"/>
  <polygon points="272,144 264,148 272,152" fill="#E63946"/>
  <text x="318" y="140" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#E63946">No</text>

  <!-- Charge at Base (red-outlined critical) -->
  <rect x="150" y="132" width="114" height="32" rx="10" fill="#E63946" fill-opacity="0.10" stroke="#E63946" stroke-width="1.5"/>
  <text x="207" y="153" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#E63946">Charge at Base</text>

  <!-- Loop back from Charge to UAV Idle -->
  <line x1="207" y1="132" x2="207" y2="70" stroke="#E63946" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="207" y1="70" x2="365" y2="70" stroke="#E63946" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="363,66 371,70 363,74" fill="#E63946"/>

  <!-- Yes branch: down -->
  <line x1="450" y1="180" x2="450" y2="198" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="446,196 450,204 454,196" fill="#CCCCCC"/>
  <text x="462" y="194" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#4CAF50">Yes</text>

  <!-- ============ ROW 3: Pick Target ============ -->
  <rect x="380" y="206" width="140" height="32" rx="10" fill="#00D4FF" fill-opacity="0.12" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="450" y="227" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600" fill="#00D4FF">Pick Target</text>

  <!-- Arrow down -->
  <line x1="450" y1="238" x2="450" y2="250" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="446,248 450,256 454,248" fill="#CCCCCC"/>

  <!-- ============ ROW 4: Score formula ============ -->
  <rect x="320" y="258" width="260" height="32" rx="10" fill="#00D4FF" fill-opacity="0.08" stroke="#00D4FF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="450" y="278" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#AACCDD">Score = probability / dist - repulsion</text>

  <!-- Arrow down -->
  <line x1="450" y1="290" x2="450" y2="302" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="446,300 450,308 454,300" fill="#CCCCCC"/>

  <!-- ============ ROW 5: A* Pathfinding ============ -->
  <rect x="345" y="310" width="210" height="32" rx="10" fill="#00D4FF" fill-opacity="0.12" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="450" y="331" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600" fill="#00D4FF">A* Pathfinding to Target</text>

  <!-- Arrow down -->
  <line x1="450" y1="342" x2="450" y2="354" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="446,352 450,360 454,352" fill="#CCCCCC"/>

  <!-- ============ ROW 6: Move 1 cell/tick ============ -->
  <rect x="375" y="362" width="150" height="32" rx="10" fill="#00D4FF" fill-opacity="0.12" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="450" y="383" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="600" fill="#00D4FF">Move 1 cell/tick</text>

  <!-- Arrow down -->
  <line x1="450" y1="394" x2="450" y2="406" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="446,404 450,412 454,404" fill="#CCCCCC"/>

  <!-- ============ ROW 7: Decision - Arrived? ============ -->
  <polygon points="450,414 520,438 450,462 380,438" fill="#F4A261" fill-opacity="0.12" stroke="#F4A261" stroke-width="1.5"/>
  <text x="450" y="442" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#F4A261">Arrived?</text>

  <!-- No: loop back to Move -->
  <line x1="380" y1="438" x2="335" y2="438" stroke="#CCCCCC" stroke-width="1"/>
  <text x="358" y="432" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#E63946">No</text>
  <line x1="335" y1="438" x2="335" y2="378" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="335" y1="378" x2="375" y2="378" stroke="#CCCCCC" stroke-width="1"/>
  <polygon points="373,374 381,378 373,382" fill="#CCCCCC"/>

  <!-- Yes: right to Thermal Scan -->
  <line x1="520" y1="438" x2="575" y2="438" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="573,434 581,438 573,442" fill="#CCCCCC"/>
  <text x="548" y="430" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#4CAF50">Yes</text>

  <!-- ============ Thermal Scan ============ -->
  <rect x="583" y="422" width="170" height="32" rx="10" fill="#00D4FF" fill-opacity="0.12" stroke="#00D4FF" stroke-width="1.5"/>
  <text x="668" y="443" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="600" fill="#00D4FF">Thermal Scan (r=2)</text>

  <!-- Arrow up from Thermal Scan -->
  <line x1="668" y1="422" x2="668" y2="393" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="664,395 668,387 672,395" fill="#CCCCCC"/>

  <!-- ============ Decision: Objective Found? ============ -->
  <polygon points="668,385 748,360 668,335 588,360" fill="#F4A261" fill-opacity="0.12" stroke="#F4A261" stroke-width="1.5"/>
  <text x="668" y="357" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#F4A261">Objective</text>
  <text x="668" y="369" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#F4A261">Found?</text>

  <!-- Yes: right to Claim + Log -->
  <line x1="748" y1="360" x2="785" y2="360" stroke="#4CAF50" stroke-width="1.2"/>
  <polygon points="783,356 791,360 783,364" fill="#4CAF50"/>
  <text x="766" y="352" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#4CAF50">Yes</text>

  <rect x="793" y="344" width="95" height="32" rx="10" fill="#4CAF50" fill-opacity="0.12" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="840" y="365" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#4CAF50">Claim + Log</text>

  <!-- No: left to Update Heatmap -->
  <line x1="588" y1="360" x2="555" y2="360" stroke="#CCCCCC" stroke-width="1.2"/>
  <polygon points="557,356 549,360 557,364" fill="#CCCCCC"/>
  <text x="572" y="352" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#E63946">No</text>

  <rect x="442" y="344" width="108" height="32" rx="10" fill="#00D4FF" fill-opacity="0.10" stroke="#00D4FF" stroke-width="1"/>
  <text x="496" y="365" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#00D4FF">Update Heatmap</text>

  <!-- Both converge up to "Pick Next Target" area near Pick Target -->
  <!-- Update Heatmap -> up to Pick Target -->
  <line x1="496" y1="344" x2="496" y2="280" stroke="#00D4FF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="496" y1="280" x2="520" y2="274" stroke="#00D4FF" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="518,270 526,274 518,278" fill="#00D4FF" opacity="0.5"/>

  <!-- Claim + Log -> loops back up -->
  <line x1="840" y1="344" x2="840" y2="222" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="840" y1="222" x2="520" y2="222" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <polygon points="522,218 514,222 522,226" fill="#4CAF50" opacity="0.5"/>

  <!-- ============ Decision: Power covers return trip? (left side) ============ -->
  <polygon points="140,300 230,275 140,250 50,275" fill="#F4A261" fill-opacity="0.12" stroke="#F4A261" stroke-width="1.5"/>
  <text x="140" y="272" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#F4A261">Power covers</text>
  <text x="140" y="284" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#F4A261">return trip?</text>

  <!-- Connection: Move -> Power check (runs periodically) -->
  <line x1="375" y1="378" x2="255" y2="378" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="255" y1="378" x2="255" y2="295" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="255" y1="295" x2="230" y2="280" stroke="#CCCCCC" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="275" y="340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="8" fill="#888888" transform="rotate(-90 275,340)">periodic check</text>

  <!-- No: Recall to Base -->
  <line x1="140" y1="250" x2="140" y2="220" stroke="#E63946" stroke-width="1.2"/>
  <polygon points="136,222 140,214 144,222" fill="#E63946"/>
  <text x="155" y="238" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#E63946">No</text>

  <rect x="85" y="188" width="110" height="28" rx="10" fill="#E63946" fill-opacity="0.10" stroke="#E63946" stroke-width="1.5"/>
  <text x="140" y="207" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#E63946">Recall to Base</text>

  <!-- Recall -> loops to Charge at Base -->
  <line x1="140" y1="188" x2="140" y2="164" stroke="#E63946" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="140" y1="164" x2="150" y2="164" stroke="#E63946" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="148,160 156,164 148,168" fill="#E63946"/>

  <!-- Yes: continue searching -->
  <line x1="50" y1="275" x2="22" y2="275" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="36" y="268" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="600" fill="#4CAF50">Yes</text>
  <line x1="22" y1="275" x2="22" y2="470" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="22" y1="470" x2="450" y2="470" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="230" y="483" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#4CAF50" opacity="0.7">continue searching</text>
  <line x1="450" y1="470" x2="450" y2="462" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ============ LEGEND ============ -->
  <rect x="700" y="52" width="12" height="12" rx="3" fill="#00D4FF" fill-opacity="0.15" stroke="#00D4FF" stroke-width="1"/>
  <text x="718" y="63" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">Action</text>

  <polygon points="706,80 712,74 718,80 712,86" fill="#F4A261" fill-opacity="0.15" stroke="#F4A261" stroke-width="1"/>
  <text x="726" y="84" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">Decision</text>

  <rect x="700" y="96" width="12" height="12" rx="3" fill="#E63946" fill-opacity="0.15" stroke="#E63946" stroke-width="1"/>
  <text x="718" y="106" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#8899AA">Critical</text>

  <!-- Decorative corner accents -->
  <line x1="8" y1="12" x2="8" y2="32" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="12" x2="28" y2="12" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="892" y1="12" x2="892" y2="32" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="892" y1="12" x2="872" y2="12" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="488" x2="8" y2="468" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="488" x2="28" y2="488" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="892" y1="488" x2="892" y2="468" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="892" y1="488" x2="872" y2="488" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
</svg>