<svg xmlns="http://www.w3.org/2000/svg" width="520" height="1180" viewBox="0 0 520 1180">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#667"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#E63946"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#06D6A0"/></marker>
  </defs>
  <style>
    text{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif}
    .l{font-size:12px;font-weight:600} .y{font-size:10px;font-weight:700} .n{font-size:10px;fill:#8899AA}
    .act{fill-opacity:.12;stroke-width:1.5} .dec{fill-opacity:.12;stroke-width:1.5}
  </style>
  <rect width="520" height="1180" rx="12" fill="#0B1426"/>
  <!-- Title + Legend -->
  <text x="260" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#FFF">Drone.step() -- Autonomous Behavior</text>
  <rect x="340" y="14" width="14" height="14" rx="4" fill="#4DA8DA" fill-opacity=".15" stroke="#4DA8DA"/>
  <text x="358" y="25" class="n">Action</text>
  <polygon points="410,14 420,21 410,28 400,21" fill="#F4A261" fill-opacity=".15" stroke="#F4A261"/>
  <text x="425" y="25" class="n">Decision</text>
  <!-- START -->
  <rect x="205" y="52" width="110" height="34" rx="17" class="act" fill="#4DA8DA" stroke="#4DA8DA"/>
  <text x="260" y="74" text-anchor="middle" class="l" fill="#4DA8DA">step() called</text>
  <line x1="260" y1="86" x2="260" y2="108" stroke="#667" marker-end="url(#a)"/>
  <!-- D1: power < return_cost? -->
  <polygon points="260,110 365,145 260,180 155,145" class="dec" fill="#F4A261" stroke="#F4A261"/>
  <text x="260" y="141" text-anchor="middle" class="l" fill="#F4A261">power &lt;</text>
  <text x="260" y="155" text-anchor="middle" class="l" fill="#F4A261">return_cost?</text>
  <!-- D1 Y -> Force RTB -->
  <line x1="365" y1="145" x2="430" y2="145" stroke="#E63946" marker-end="url(#ar)"/>
  <text x="390" y="138" class="y" fill="#E63946">Y</text>
  <rect x="433" y="128" width="76" height="34" rx="8" class="act" fill="#E63946" stroke="#E63946"/>
  <text x="471" y="150" text-anchor="middle" class="l" fill="#E63946">Force RTB</text>
  <text x="471" y="175" text-anchor="middle" class="n" font-size="9">overrides agent</text>
  <!-- D1 N -> down -->
  <line x1="260" y1="180" x2="260" y2="208" stroke="#667" marker-end="url(#a)"/>
  <text x="270" y="198" class="y" fill="#06D6A0">N</text>
  <!-- D2: At base + charging -->
  <polygon points="260,210 365,245 260,280 155,245" class="dec" fill="#F4A261" stroke="#F4A261"/>
  <text x="260" y="241" text-anchor="middle" class="l" fill="#F4A261">at base &amp;</text>
  <text x="260" y="255" text-anchor="middle" class="l" fill="#F4A261">power &lt; 95%?</text>
  <line x1="365" y1="245" x2="430" y2="245" stroke="#E63946" marker-end="url(#ar)"/>
  <text x="390" y="238" class="y" fill="#E63946">Y</text>
  <rect x="433" y="228" width="76" height="34" rx="8" class="act" fill="#F4A261" stroke="#F4A261"/>
  <text x="471" y="250" text-anchor="middle" class="l" fill="#F4A261">Charge</text>
  <text x="471" y="275" text-anchor="middle" class="n" font-size="9">block &lt; 30%</text>
  <line x1="260" y1="280" x2="260" y2="308" stroke="#667" marker-end="url(#a)"/>
  <text x="270" y="298" class="y" fill="#06D6A0">N</text>
  <!-- D3: Has path? -->
  <polygon points="260,310 345,340 260,370 175,340" class="dec" fill="#F4A261" stroke="#F4A261"/>
  <text x="260" y="344" text-anchor="middle" class="l" fill="#F4A261">has path?</text>
  <line x1="260" y1="370" x2="260" y2="398" stroke="#667" marker-end="url(#a)"/>
  <text x="270" y="388" class="y" fill="#06D6A0">Y</text>
  <!-- Advance -->
  <rect x="175" y="400" width="170" height="34" rx="8" class="act" fill="#4DA8DA" stroke="#4DA8DA"/>
  <text x="260" y="422" text-anchor="middle" class="l" fill="#4DA8DA">Advance 1 cell</text>
  <text x="260" y="447" text-anchor="middle" class="n" font-size="9">collision avoidance</text>
  <line x1="260" y1="434" x2="260" y2="468" stroke="#667" marker-end="url(#a)"/>
  <!-- D4: Path finished? -->
  <polygon points="260,470 355,500 260,530 165,500" class="dec" fill="#F4A261" stroke="#F4A261"/>
  <text x="260" y="497" text-anchor="middle" class="l" fill="#F4A261">path empty?</text>
  <text x="260" y="510" text-anchor="middle" class="l" fill="#F4A261">(finished)</text>
  <!-- D4 N -> loop back -->
  <line x1="165" y1="500" x2="120" y2="500" stroke="#667"/>
  <text x="138" y="493" class="y" fill="#E63946">N</text>
  <polyline points="120,500 120,417 167,417" fill="none" stroke="#667" marker-end="url(#a)"/>
  <!-- D4 Y -> down -->
  <line x1="260" y1="530" x2="260" y2="558" stroke="#667" marker-end="url(#a)"/>
  <text x="270" y="548" class="y" fill="#06D6A0">Y</text>
  <!-- D5: command source? -->
  <polygon points="260,560 365,595 260,630 155,595" class="dec" fill="#F4A261" stroke="#F4A261"/>
  <text x="260" y="591" text-anchor="middle" class="l" fill="#F4A261">command</text>
  <text x="260" y="605" text-anchor="middle" class="l" fill="#F4A261">source?</text>
  <!-- Agent branch -->
  <line x1="365" y1="595" x2="430" y2="595" stroke="#667" marker-end="url(#a)"/>
  <text x="390" y="588" class="y" fill="#4DA8DA">agent</text>
  <rect x="433" y="578" width="76" height="34" rx="8" class="act" fill="#4DA8DA" stroke="#4DA8DA"/>
  <text x="471" y="600" text-anchor="middle" class="l" fill="#4DA8DA">Set idle</text>
  <text x="471" y="625" text-anchor="middle" class="n" font-size="9">wait for cmd</text>
  <!-- Autopilot branch -->
  <line x1="155" y1="595" x2="90" y2="595" stroke="#667" marker-end="url(#a)"/>
  <text x="128" y="588" class="y" fill="#06D6A0">auto</text>
  <rect x="10" y="578" width="78" height="34" rx="8" class="act" fill="#06D6A0" stroke="#06D6A0"/>
  <text x="49" y="593" text-anchor="middle" class="l" fill="#06D6A0">Scan +</text>
  <text x="49" y="607" text-anchor="middle" class="l" fill="#06D6A0">new tgt</text>
  <!-- D3 N bypass to idle timeout -->
  <line x1="345" y1="340" x2="400" y2="340" stroke="#667"/>
  <text x="367" y="333" class="y" fill="#E63946">N</text>
  <polyline points="400,340 400,710 268,710" fill="none" stroke="#667" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="390" y="530" class="n" font-size="9" transform="rotate(90 390,530)">no path</text>
  <!-- Merge down -->
  <line x1="260" y1="630" x2="260" y2="700" stroke="#667" marker-end="url(#a)"/>
  <!-- D6: Agent idle timeout -->
  <polygon points="260,702 370,737 260,772 150,737" class="dec" fill="#F4A261" stroke="#F4A261"/>
  <text x="260" y="730" text-anchor="middle" class="l" fill="#F4A261">agent idle</text>
  <text x="260" y="744" text-anchor="middle" class="l" fill="#F4A261">&gt; 10 ticks?</text>
  <line x1="370" y1="737" x2="430" y2="737" stroke="#667" marker-end="url(#a)"/>
  <text x="393" y="730" class="y" fill="#06D6A0">Y</text>
  <rect x="433" y="720" width="76" height="34" rx="8" class="act" fill="#06D6A0" stroke="#06D6A0"/>
  <text x="471" y="742" text-anchor="middle" class="l" fill="#06D6A0">Release</text>
  <text x="471" y="767" text-anchor="middle" class="n" font-size="9">to autopilot</text>
  <line x1="260" y1="772" x2="260" y2="808" stroke="#667" marker-end="url(#a)"/>
  <text x="270" y="795" class="y" fill="#E63946">N</text>
  <!-- D7: Idle + autopilot? -->
  <polygon points="260,810 365,845 260,880 155,845" class="dec" fill="#F4A261" stroke="#F4A261"/>
  <text x="260" y="838" text-anchor="middle" class="l" fill="#F4A261">idle &amp;</text>
  <text x="260" y="852" text-anchor="middle" class="l" fill="#F4A261">autopilot?</text>
  <line x1="365" y1="845" x2="430" y2="845" stroke="#667" marker-end="url(#a)"/>
  <text x="390" y="838" class="y" fill="#E63946">N</text>
  <rect x="433" y="828" width="76" height="34" rx="8" class="act" fill="#4DA8DA" stroke="#4DA8DA"/>
  <text x="471" y="850" text-anchor="middle" class="l" fill="#4DA8DA">Wait</text>
  <line x1="260" y1="880" x2="260" y2="908" stroke="#667" marker-end="url(#a)"/>
  <text x="270" y="898" class="y" fill="#06D6A0">Y</text>
  <!-- _pick_target -->
  <rect x="160" y="910" width="200" height="34" rx="8" class="act" fill="#06D6A0" stroke="#06D6A0"/>
  <text x="260" y="932" text-anchor="middle" class="l" fill="#06D6A0">_pick_target()</text>
  <line x1="260" y1="944" x2="260" y2="968" stroke="#667" marker-end="url(#a)"/>
  <!-- Score formula -->
  <rect x="100" y="970" width="320" height="60" rx="8" fill="#0D1B30" stroke="#4DA8DA" stroke-dasharray="4,2"/>
  <text x="260" y="992" text-anchor="middle" font-size="13" font-weight="700" fill="#4DA8DA">score = (prob + 0.1) / sqrt(dist)</text>
  <text x="292" y="1010" text-anchor="middle" font-size="13" font-weight="700" fill="#4DA8DA">- repulsion * weight</text>
  <text x="260" y="1042" text-anchor="middle" class="n" font-size="9">round-trip power budget filters candidates</text>
  <line x1="260" y1="1030" x2="260" y2="1068" stroke="#667" marker-end="url(#a)"/>
  <!-- Plan path -->
  <rect x="175" y="1070" width="170" height="34" rx="8" class="act" fill="#4DA8DA" stroke="#4DA8DA"/>
  <text x="260" y="1092" text-anchor="middle" class="l" fill="#4DA8DA">A* path to target</text>
  <line x1="260" y1="1104" x2="260" y2="1128" stroke="#667" marker-end="url(#a)"/>
  <!-- End -->
  <rect x="205" y="1130" width="110" height="34" rx="17" class="act" fill="#4DA8DA" stroke="#4DA8DA"/>
  <text x="260" y="1152" text-anchor="middle" class="l" fill="#4DA8DA">next tick</text>
  <!-- Corner accents -->
  <path d="M8,30 V10 H28" fill="none" stroke="#4DA8DA" opacity=".3"/>
  <path d="M492,10 H512 V30" fill="none" stroke="#4DA8DA" opacity=".3"/>
  <path d="M8,1150 V1170 H28" fill="none" stroke="#4DA8DA" opacity=".3"/>
  <path d="M492,1170 H512 V1150" fill="none" stroke="#4DA8DA" opacity=".3"/>
</svg>