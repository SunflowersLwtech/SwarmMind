<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00D4FF" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" rx="0" ry="0" fill="#0B1426"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="155" x2="1000" y2="155" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="0" y1="275" x2="1000" y2="275" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="0" y1="435" x2="1000" y2="435" stroke="#00D4FF" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#00D4FF" filter="url(#glow)">SwarmMind System Architecture</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 1: Frontend                          -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="100" y="50" width="800" height="100" rx="10" ry="10" fill="#0E1A30" stroke="#00D4FF" stroke-width="1" filter="url(#glowSoft)"/>

  <!-- Icon circle -->
  <circle cx="140" cy="80" r="14" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
  <text x="140" y="85" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#00D4FF">F</text>

  <!-- Layer label -->
  <text x="165" y="76" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" font-weight="600">LAYER 1</text>
  <text x="165" y="93" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">React + R3F + Zustand</text>

  <!-- Port badge -->
  <rect x="800" y="65" width="85" height="22" rx="11" ry="11" fill="#00D4FF" opacity="0.15"/>
  <text x="842" y="80" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF" font-weight="600">:3000</text>

  <!-- Sub-items -->
  <rect x="130" y="110" width="120" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="190" y="127" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">3D Tactical Map</text>

  <rect x="265" y="110" width="100" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="315" y="127" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Fleet Panel</text>

  <rect x="380" y="110" width="140" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="450" y="127" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Command Console</text>

  <rect x="535" y="110" width="100" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="585" y="127" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Dashboard</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Arrow: Layer 1 → Layer 2                   -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="500" y1="150" x2="500" y2="178" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)" opacity="0.8"/>
  <rect x="425" y="155" width="150" height="20" rx="4" ry="4" fill="#0B1426"/>
  <text x="500" y="169" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF" opacity="0.9" font-weight="600">WebSocket + REST</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 2: FastAPI Gateway                   -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="250" y="185" width="500" height="85" rx="10" ry="10" fill="#0E1A30" stroke="#00D4FF" stroke-width="1" filter="url(#glowSoft)"/>

  <!-- Icon circle -->
  <circle cx="290" cy="215" r="14" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
  <text x="290" y="220" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#00D4FF">A</text>

  <!-- Layer label -->
  <text x="315" y="210" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" font-weight="600">LAYER 2</text>
  <text x="315" y="228" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">FastAPI Gateway</text>

  <!-- Port badge -->
  <rect x="650" y="205" width="85" height="22" rx="11" ry="11" fill="#00D4FF" opacity="0.15"/>
  <text x="692" y="220" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF" font-weight="600">:8000</text>

  <!-- Sub-items -->
  <rect x="290" y="242" width="150" height="22" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="365" y="257" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">WebSocket /ws/live</text>

  <rect x="455" y="242" width="120" height="22" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="515" y="257" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">REST /api/*</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Arrow: Layer 2 → Layer 3                   -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="400" y1="270" x2="300" y2="310" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)" opacity="0.7"/>
  <line x1="600" y1="270" x2="700" y2="310" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)" opacity="0.7"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 3 LEFT: Google ADK Agents            -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="60" y="315" width="420" height="115" rx="10" ry="10" fill="#0E1A30" stroke="#00D4FF" stroke-width="1" filter="url(#glowSoft)"/>

  <!-- Icon circle -->
  <circle cx="100" cy="345" r="14" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
  <text x="100" y="350" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#00D4FF">G</text>

  <!-- Layer label -->
  <text x="125" y="340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" font-weight="600">LAYER 3</text>
  <text x="125" y="358" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Google ADK Agents</text>

  <!-- Agent pipeline -->
  <rect x="90" y="372" width="370" height="22" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="275" y="387" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Assessor &#x2192; Strategist &#x2192; Dispatcher &#x2192; Analyst</text>

  <!-- Model badge -->
  <rect x="90" y="400" width="140" height="22" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="160" y="415" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Gemini 2.5 Flash</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 3 RIGHT: MCP Tool Server             -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="530" y="315" width="410" height="115" rx="10" ry="10" fill="#0E1A30" stroke="#00D4FF" stroke-width="1" filter="url(#glowSoft)"/>

  <!-- Icon circle -->
  <circle cx="570" cy="345" r="14" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
  <text x="570" y="350" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#00D4FF">M</text>

  <!-- Layer label -->
  <text x="595" y="340" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" font-weight="600">LAYER 3</text>
  <text x="595" y="358" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">MCP Tool Server</text>

  <!-- Port badge -->
  <rect x="830" y="333" width="95" height="22" rx="11" ry="11" fill="#00D4FF" opacity="0.15"/>
  <text x="877" y="348" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#00D4FF" font-weight="600">:8001/mcp</text>

  <!-- Sub-items -->
  <rect x="560" y="372" width="110" height="22" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="615" y="387" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">18 MCP Tools</text>

  <rect x="685" y="372" width="140" height="22" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="755" y="387" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Streamable HTTP</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Arrow: ADK ↔ MCP (MCP Protocol)            -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="480" y1="372" x2="530" y2="372" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)" opacity="0.8"/>
  <line x1="530" y1="380" x2="480" y2="380" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)" opacity="0.8"/>
  <rect x="470" y="355" width="90" height="18" rx="4" ry="4" fill="#0B1426"/>
  <text x="515" y="367" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#00D4FF" opacity="0.9" font-weight="600">MCP Protocol</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Arrow: Layer 3 → Layer 4                   -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="735" y1="430" x2="600" y2="480" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)" opacity="0.7"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 4: Simulation Engine                 -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="150" y="485" width="700" height="110" rx="10" ry="10" fill="#0E1A30" stroke="#00D4FF" stroke-width="1" filter="url(#glowSoft)"/>

  <!-- Icon circle -->
  <circle cx="190" cy="515" r="14" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
  <text x="190" y="520" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#00D4FF">S</text>

  <!-- Layer label -->
  <text x="215" y="510" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#00D4FF" opacity="0.6" font-weight="600">LAYER 4</text>
  <text x="215" y="528" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Simulation Engine — GridWorld 20x20</text>

  <!-- Sub-items -->
  <rect x="190" y="546" width="90" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="235" y="563" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">UAV Fleet</text>

  <rect x="295" y="546" width="120" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="355" y="563" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">A* Pathfinding</text>

  <rect x="430" y="546" width="160" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="510" y="563" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Probability Heatmap</text>

  <rect x="605" y="546" width="150" height="26" rx="6" ry="6" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="680" y="563" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#B0C4DE">Terrain / Obstacles</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Decorative corner accents                  -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="10" y1="10" x2="40" y2="10" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="10" x2="10" y2="40" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="960" y1="10" x2="990" y2="10" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="990" y1="10" x2="990" y2="40" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="580" x2="10" y2="610" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="10" y1="610" x2="40" y2="610" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="990" y1="580" x2="990" y2="610" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
  <line x1="960" y1="610" x2="990" y2="610" stroke="#00D4FF" stroke-width="1" opacity="0.3"/>
</svg>