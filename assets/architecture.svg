<svg xmlns="http://www.w3.org/2000/svg" width="800" height="680" viewBox="0 0 800 680">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4DA8DA" opacity="0.9"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#06D6A0" opacity="0.9"/></marker>
    <marker id="arrA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#F4A261" opacity="0.9"/></marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="680" fill="#0B1426"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#00D4FF" filter="url(#glow)">SwarmMind — System Architecture</text>

  <!-- ══════════ LAYER 1: Frontend ══════════ -->
  <rect x="60" y="50" width="680" height="100" rx="8" fill="#0E1A30" stroke="#00D4FF" stroke-width="1.2"/>
  <text x="80" y="72" font-family="sans-serif" font-size="10" fill="#00D4FF" opacity="0.6" font-weight="600">LAYER 1</text>
  <text x="80" y="90" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">Frontend</text>
  <text x="80" y="105" font-family="sans-serif" font-size="10" fill="#4DA8DA">React + React Three Fiber + Zustand</text>
  <rect x="300" y="65" width="110" height="24" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="355" y="81" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">3D Tactical Map</text>
  <rect x="420" y="65" width="120" height="24" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="480" y="81" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">Command Console</text>
  <rect x="550" y="65" width="90" height="24" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="595" y="81" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">Fleet Panel</text>
  <rect x="300" y="100" width="130" height="22" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="365" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">WebSocket Client</text>
  <rect x="665" y="63" width="60" height="20" rx="10" fill="#00D4FF" opacity="0.15"/>
  <text x="695" y="77" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00D4FF" font-weight="600">:3000</text>

  <!-- Arrow: Frontend → Gateway -->
  <line x1="400" y1="150" x2="400" y2="180" stroke="#4DA8DA" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)" opacity="0.9"/>
  <text x="400" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#4DA8DA" font-weight="600">
    <tspan dx="50">WebSocket 5Hz</tspan>
  </text>

  <!-- ══════════ LAYER 2: API Gateway ══════════ -->
  <rect x="60" y="185" width="680" height="105" rx="8" fill="#0E1A30" stroke="#06D6A0" stroke-width="1.2"/>
  <text x="80" y="207" font-family="sans-serif" font-size="10" fill="#06D6A0" opacity="0.6" font-weight="600">LAYER 2</text>
  <text x="80" y="225" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">API Gateway</text>
  <text x="80" y="240" font-family="sans-serif" font-size="10" fill="#06D6A0">FastAPI (unified process)</text>
  <rect x="300" y="200" width="130" height="24" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="365" y="216" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">WS /ws/live (5Hz)</text>
  <rect x="440" y="200" width="110" height="24" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="495" y="216" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">REST /api/*</text>
  <rect x="560" y="200" width="100" height="24" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="610" y="216" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">Static Hosting</text>
  <rect x="300" y="235" width="130" height="24" rx="5" fill="#131F38" stroke="#06D6A0" stroke-width="0.8"/>
  <text x="365" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#06D6A0">MCP Tool Server</text>
  <rect x="440" y="235" width="80" height="24" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="480" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">8 Tools</text>
  <rect x="620" y="198" width="55" height="20" rx="10" fill="#06D6A0" opacity="0.15"/>
  <text x="647" y="212" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06D6A0" font-weight="600">:8000</text>
  <rect x="620" y="238" width="55" height="20" rx="10" fill="#06D6A0" opacity="0.15"/>
  <text x="647" y="252" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06D6A0" font-weight="600">:8001</text>
  <!-- In-process note -->
  <rect x="530" y="235" width="80" height="24" rx="5" fill="none" stroke="#06D6A0" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="570" y="251" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#06D6A0" opacity="0.7">same proc</text>
  <!-- Arrow down-left to Sim Engine -->
  <line x1="500" y1="290" x2="500" y2="440" stroke="#06D6A0" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrG)" opacity="0.6"/>
  <text x="510" y="380" font-family="sans-serif" font-size="9" fill="#06D6A0" opacity="0.8" font-weight="600">in-process</text>

  <!-- ══════════ LAYER 3: AI Agent Layer ══════════ -->
  <rect x="60" y="320" width="370" height="110" rx="8" fill="#0E1A30" stroke="#F4A261" stroke-width="1.2"/>
  <text x="80" y="342" font-family="sans-serif" font-size="10" fill="#F4A261" opacity="0.6" font-weight="600">LAYER 3</text>
  <text x="80" y="360" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">AI Agent Layer</text>
  <text x="80" y="375" font-family="sans-serif" font-size="10" fill="#F4A261">Google ADK + Gemini 2.5 Flash</text>
  <!-- Pipeline stages -->
  <rect x="80" y="388" width="75" height="24" rx="5" fill="#1C1308" stroke="#F4A261" stroke-width="0.8"/>
  <text x="117" y="404" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#F4A261" font-weight="600">Assessor</text>
  <text x="163" y="404" font-family="sans-serif" font-size="10" fill="#F4A261" opacity="0.5">&#x2192;</text>
  <rect x="175" y="388" width="75" height="24" rx="5" fill="#1C1308" stroke="#F4A261" stroke-width="0.8"/>
  <text x="212" y="404" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#F4A261" font-weight="600">Strategist</text>
  <text x="258" y="404" font-family="sans-serif" font-size="10" fill="#F4A261" opacity="0.5">&#x2192;</text>
  <rect x="270" y="388" width="80" height="24" rx="5" fill="#1C1308" stroke="#F4A261" stroke-width="0.8"/>
  <text x="310" y="404" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#F4A261" font-weight="600">Dispatcher</text>
  <text x="358" y="404" font-family="sans-serif" font-size="10" fill="#F4A261" opacity="0.5">&#x2192;</text>
  <rect x="370" y="388" width="48" height="24" rx="5" fill="#1C1308" stroke="#F4A261" stroke-width="0.8"/>
  <text x="394" y="404" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#F4A261" font-weight="600">Analyst</text>
  <!-- McpToolset note -->
  <text x="80" y="425" font-family="sans-serif" font-size="9" fill="#B0C4DE" opacity="0.6">Each stage uses McpToolset</text>

  <!-- Arrow: AI Agent ↔ MCP Server -->
  <line x1="430" y1="365" x2="490" y2="260" stroke="#F4A261" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrA)" opacity="0.8"/>
  <text x="478" y="320" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#F4A261" font-weight="600" transform="rotate(-52,478,320)">Streamable HTTP</text>

  <!-- ══════════ LAYER 4: Simulation Engine ══════════ -->
  <rect x="60" y="450" width="680" height="110" rx="8" fill="#0E1A30" stroke="#E63946" stroke-width="1.2"/>
  <text x="80" y="472" font-family="sans-serif" font-size="10" fill="#E63946" opacity="0.6" font-weight="600">LAYER 4</text>
  <text x="80" y="490" font-family="sans-serif" font-size="14" font-weight="700" fill="#fff">Simulation Engine</text>
  <text x="80" y="505" font-family="sans-serif" font-size="10" fill="#E63946">Shared GridWorld (configurable size)</text>
  <rect x="80" y="515" width="115" height="26" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="137" y="532" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">Drone Agents</text>
  <rect x="205" y="515" width="115" height="26" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="262" y="532" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">PathPlanner (A*)</text>
  <rect x="330" y="515" width="155" height="26" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="407" y="532" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">ObjectiveField (Gauss)</text>
  <rect x="495" y="515" width="130" height="26" rx="5" fill="#131F38" stroke="#1A3050" stroke-width="0.5"/>
  <text x="560" y="532" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B0C4DE">Terrain / Obstacles</text>
  <!-- Autonomous tick note -->
  <rect x="636" y="515" width="90" height="26" rx="5" fill="#1C0B0D" stroke="#E63946" stroke-width="0.6"/>
  <text x="681" y="532" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#E63946" font-weight="600">step() / tick</text>

  <!-- ══════════ Legend ══════════ -->
  <rect x="60" y="585" width="680" height="70" rx="8" fill="#0E1A30" stroke="#1A3050" stroke-width="0.5"/>
  <text x="80" y="605" font-family="sans-serif" font-size="10" fill="#B0C4DE" font-weight="600" opacity="0.7">DATA FLOWS</text>
  <!-- Legend items -->
  <line x1="80" y1="622" x2="120" y2="622" stroke="#4DA8DA" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="128" y="626" font-family="sans-serif" font-size="9" fill="#B0C4DE">Frontend &#x2194; Gateway (WebSocket)</text>
  <line x1="330" y1="622" x2="370" y2="622" stroke="#F4A261" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="378" y="626" font-family="sans-serif" font-size="9" fill="#B0C4DE">AI Agent &#x2194; MCP Server (HTTP)</text>
  <line x1="570" y1="622" x2="610" y2="622" stroke="#06D6A0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="618" y="626" font-family="sans-serif" font-size="9" fill="#B0C4DE">MCP &#x2192; GridWorld (in-proc)</text>
  <!-- Autonomous note -->
  <rect x="80" y="637" width="8" height="8" rx="2" fill="#E63946"/>
  <text x="96" y="645" font-family="sans-serif" font-size="9" fill="#B0C4DE">Drones step() autonomously each simulation tick</text>

  <!-- Corner accents -->
  <line x1="8" y1="8" x2="35" y2="8" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  <line x1="8" y1="8" x2="8" y2="35" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  <line x1="765" y1="8" x2="792" y2="8" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  <line x1="792" y1="8" x2="792" y2="35" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  <line x1="8" y1="645" x2="8" y2="672" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  <line x1="8" y1="672" x2="35" y2="672" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  <line x1="792" y1="645" x2="792" y2="672" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
  <line x1="765" y1="672" x2="792" y2="672" stroke="#00D4FF" stroke-width="1" opacity="0.25"/>
</svg>